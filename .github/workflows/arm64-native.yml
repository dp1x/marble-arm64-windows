name: Build Native ARM64

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  id-token: write
  attestations: write
  contents: write

jobs:
  build:
    runs-on: windows-11-vs2026-arm
    timeout-minutes: 240
    env:
      MARBLE_VERSION: 22.07.70
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies (vcpkg)
        shell: powershell
        run: |
          $env:PATH = "C:\vcpkg;" + $env:PATH
          vcpkg install zlib:arm64-windows
          vcpkg install protobuf:arm64-windows
          vcpkg install qt5-base:arm64-windows
          vcpkg install qt5-svg:arm64-windows

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -G "Visual Studio 18 2026" `
            -A ARM64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DMARBLE_DATA_PATH="data" `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=arm64-windows `
            -DCMAKE_CXX_FLAGS="/DWIN32 /D_WINDOWS /W3 /GR /EHsc /D_CRT_SECURE_NO_WARNINGS /std:c++17" `
            -DCMAKE_CXX_STANDARD=17 `
            -DBUILD_MARBLE_TESTS=OFF `
            -DBUILD_MARBLE_EXAMPLES=OFF `
            -DBUILD_MARBLE_TOOLS=OFF `
            -DBUILD_MARBLE_APPS=ON `
            -DBUILD_WITH_DBUS=OFF

      - name: Build Project
        shell: powershell
        run: cmake --build build --config Release --parallel 2

      - name: Collect Artifacts
        shell: powershell
        run: |
          $distDir = "dist"
          if (Test-Path $distDir) { Remove-Item $distDir -Recurse -Force }
          New-Item -ItemType Directory -Path "$distDir\plugins\platforms" | Out-Null
          New-Item -ItemType Directory -Path "$distDir\plugins\bearer" | Out-Null
          New-Item -ItemType Directory -Path "$distDir\plugins\imageformats" | Out-Null
          New-Item -ItemType Directory -Path "$distDir\plugins\sqldrivers" | Out-Null
          New-Item -ItemType Directory -Path "$distDir\plugins\styles" | Out-Null

          $appDirs = @(
            "build\src\apps\marble-qt\Release",
            "build\src\lib\marblewidget\Release"
          )
          foreach ($dir in $appDirs) {
            if (Test-Path $dir) {
              Get-ChildItem "$dir\*.dll","$dir\*.exe" -ErrorAction SilentlyContinue |
                Copy-Item -Destination $distDir -Force
            }
          }

          Get-ChildItem "build" -Recurse -Filter "*Plugin.dll" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "platforms|bearer|imageformats|sqldrivers|styles" } |
            Copy-Item -Destination "$distDir\plugins" -Force

          Get-ChildItem "build\plugins" -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue |
            ForEach-Object {
              $base = Resolve-Path "build\plugins"
              $rel = $_.FullName.Substring($base.Path.Length + 1)
              $dest = Join-Path $distDir $rel
              $destDir = Split-Path $dest -Parent
              if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir | Out-Null }
              Copy-Item $_.FullName $dest -Force
            }

          $vcpkgDir = "C:\vcpkg\installed\arm64-windows\bin"
          $exclude = @("libprotobuf-lite.dll", "libprotoc.dll")
          if (Test-Path $vcpkgDir) {
            Get-ChildItem $vcpkgDir -Filter "*.dll" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notin $exclude } |
              Copy-Item -Destination $distDir -Force
          }

          if (Test-Path "build\data") {
            Copy-Item "build\data" "$distDir\data" -Recurse -Force
          }

          if (-not (Test-Path "dist\plugins\platforms\qwindows.dll")) {
            Write-Error "CRITICAL: qwindows.dll missing from plugins/platforms/"
            exit 1
          }

      - name: Create Release Archive
        shell: powershell
        run: |
          $version = $env:MARBLE_VERSION.Trim()
          if (-not $version) { $version = "22.07.70" }
          $zipName = "marble-arm64-win-$version.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "dist\*" -DestinationPath $zipName -CompressionLevel Optimal
          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Created $zipName ($sizeMB MB)"

      - name: Generate SHA256SUMS
        shell: powershell
        run: |
          $version = $env:MARBLE_VERSION.Trim()
          if (-not $version) { $version = "22.07.70" }
          $zipName = "marble-arm64-win-$version.zip"
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath SHA256SUMS -Encoding ascii
          Write-Host "SHA256: $hash"
          Get-Content SHA256SUMS

      - name: Verify Checksums
        shell: powershell
        run: |
          $version = $env:MARBLE_VERSION.Trim()
          if (-not $version) { $version = "22.07.70" }
          $zipName = "marble-arm64-win-$version.zip"
          $stored = (Get-Content SHA256SUMS).Split(' ')[0]
          $computed = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          if ($stored -ne $computed) {
            Write-Error "SHA256 mismatch! stored=$stored computed=$computed"
            exit 1
          }
          Write-Host "Checksum verified OK"

      - name: Attest Build Provenance (SLSA v1)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'marble-arm64-win-${{ env.MARBLE_VERSION }}.zip'

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Marble ${{ env.MARBLE_VERSION }} (ARM64 Windows)
          body: |
            Native Windows ARM64 build of KDE Marble ${{ env.MARBLE_VERSION }}.

            ## Installation
            1. Extract `marble-arm64-win-${{ env.MARBLE_VERSION }}.zip`
            2. Run `marble-qt.exe`

            ## Verification
            Verify the download with the included SHA256SUMS:
            ```powershell
            certutil -hashfile marble-arm64-win-${{ env.MARBLE_VERSION }}.zip SHA256
            ```

            ## Provenance
            Build provenance (SLSA v1): https://github.com/dp1x/marble-arm64-windows/attestations/${{ github.run_id }}
            Source commit: `${{ github.sha }}`
            Workflow run: https://github.com/dp1x/marble-arm64-windows/actions/runs/${{ github.run_id }}

            ## Upstream
            This is built from KDE Marble v${{ env.MARBLE_VERSION }}: https://invent.kde.org/education/marble/-/releases/v${{ env.MARBLE_VERSION }}

            This release was built automatically by GitHub Actions with Sigstore attestation.
          files: |
            marble-arm64-win-${{ env.MARBLE_VERSION }}.zip
            SHA256SUMS
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
